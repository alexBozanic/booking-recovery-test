<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Booking Recovery Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    input, button { display: block; margin: 1rem 0; padding: 0.5rem; width: 100%; max-width: 400px; }
    button { background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Test Booking Page</h1>
  <form id="bookingForm">
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@example.com" />

    <label for="phone">Phone</label>
    <input id="phone" type="tel" placeholder="+1-555-555-5555" />

    <button type="submit">Submit Booking</button>
  </form>

  <!-- ✅ PLACE SCRIPT AT THE BOTTOM OF BODY -->
  <script>
    const MAKE_WEBHOOK_URL = "https://hook.us2.make.com/6qa1ao69bukkl9adkewghbytjoaei25w";

    function collectFormData() {
      return {
        email: document.querySelector("#email")?.value || "",
        phone: document.querySelector("#phone")?.value || "",
        abandoned_url: window.location.href,
        timestamp: new Date().toISOString()
      };
    }

    let bookingCompleted = false;

    document.querySelector("#bookingForm").addEventListener("submit", function (e) {
      e.preventDefault();
      bookingCompleted = true;
      alert("✅ Form submitted (no real backend)");
    });

    window.addEventListener("beforeunload", function () {
      if (bookingCompleted) return;
      const payload = collectFormData();
      if (!payload.email && !payload.phone) return;

      console.log("📤 Sending abandoned booking payload:", payload);

      fetch(MAKE_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      }).then((res) => {
        console.log("✅ Payload sent", res.status);
      }).catch((err) => {
        console.error("❌ Error sending payload", err);
      });
    });
  </script>
</body>
</html>
