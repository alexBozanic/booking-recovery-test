<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Booking Recovery Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background: #f5f7f9; }
    h1 { margin-bottom: 1rem; }
    form { background: white; padding: 1.5rem; border-radius: 6px; max-width: 480px; }
    label { display: block; margin: 0.75rem 0 0.25rem; }
    input, select, button { width: 100%; padding: 0.5rem; margin-bottom: 0.5rem; }
    button { background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Book Your Stay</h1>
  <form id="bookingForm">
    <label for="fullName">Full Name</label>
    <input id="fullName" type="text" required>
    
    <label for="email">Email</label>
    <input id="email" type="email" required>

    <label for="phone">Phone</label>
    <input id="phone" type="tel">

    <label for="checkin">Check-In Date</label>
    <input id="checkin" type="date" required>

    <label for="checkout">Check-Out Date</label>
    <input id="checkout" type="date" required>

    <label for="room">Room Type</label>
    <select id="room">
      <option>Standard</option>
      <option>Deluxe</option>
      <option>Suite</option>
    </select>

    <button type="submit">Submit Booking</button>
  </form>

  <script>
    const MAKE_WEBHOOK_URL = "https://hook.us2.make.com/6qa1ao69bukkl9adkewghbytjoaei25w";

    function collectFormData() {
      return {
        fullName    : document.querySelector("#fullName")?.value || "",
        email       : document.querySelector("#email")?.value || "",
        phone       : document.querySelector("#phone")?.value || "",
        checkin     : document.querySelector("#checkin")?.value || "",
        checkout    : document.querySelector("#checkout")?.value || "",
        room        : document.querySelector("#room")?.value || "",
        abandoned_url: window.location.href,
        timestamp   : new Date().toISOString()
      };
    }

    let bookingCompleted = false;

    document.querySelector("#bookingForm").addEventListener("submit", function (e) {
      e.preventDefault();
      bookingCompleted = true;
      alert("✅ Booking submitted (demo only)");
    });

    // Replacing sendBeacon with fetch for testing
    window.addEventListener("beforeunload", function (event) {
      if (bookingCompleted) return;

      const payload = collectFormData();
      console.log("🔁 Attempting to send abandonment payload", payload);

      if (payload.email || payload.phone) {
        fetch(MAKE_WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        }).then(res => {
          console.log("✅ Payload sent via fetch", res);
        }).catch(err => {
          console.error("❌ Fetch error:", err);
        });
      }
    });
  </script>
</body>
</html>
